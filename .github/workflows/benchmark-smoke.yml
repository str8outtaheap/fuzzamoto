name: Benchmark Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install nyx dependencies
        run: sudo apt update && sudo apt install -y libgtk-3-dev pax-utils python3-msgpack python3-jinja2 libcapstone-dev
      - name: Build CLI and fuzzer
        run: cargo build --release --package fuzzamoto-cli --package fuzzamoto-libafl --features bench
      - name: Prepare dummy corpus
        run: |
          mkdir -p /tmp/bench-corpus
          echo "seed" > /tmp/bench-corpus/seed.ir
      - name: Run benchmark smoke test
        run: |
          ./target/release/fuzzamoto-cli benchmark run \
            --suite .github/bench/smoke.yaml \
            --output /tmp/bench-run
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          path: /tmp/bench-run
